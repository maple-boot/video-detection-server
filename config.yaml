srs:
  push_url_prefix: "rtmp://112.14.53.185/live/stream/"

ffmpeg:
  hwaccel: "cuda"
  fallback_cpu: true
  probe_size: 5000000
  analyzeduration: 5000000
  decode_timeout: 10
  encode_preset: "ultrafast"
  encode_tune: "zerolatency"
  write_retry_count: 2
  warmup_frames: 30
  max_reconnect: 10

model:
  default_conf: 0.75
  report_conf: 0.8
  max_box_ratio: 0.4
  classes_file_suffix: "_classes.txt"
  imgsz: 640

# SAHI 切片检测配置
sahi:
  enabled: true           # 是否启用 SAHI
  slice_size: 640         # 切片大小
  overlap_ratio: 0.2      # 切片重叠比例（0.2 = 20%重叠）
  iou_threshold: 0.5      # NMS 合并 IoU 阈值

cleanup:
  enabled: true
  schedule: "03:00"
  graceful_timeout: 30
  force_kill_timeout: 5
  restart_after_cleanup: true

resource_monitor:
  enabled: true
  check_interval: 60
  thresholds:
    max_threads: 200
    max_memory_percent: 95
    max_gpu_memory_percent: 98
    max_ffmpeg_count: 100
  action: "warn"

logging:
  log_dir: "logs"
  log_level: "INFO"
  rotation: "100 MB"
  retention: "7 days"

tracker:
  track_high_thresh: 0.5
  track_low_thresh: 0.1
  new_track_thresh: 0.5
  track_buffer: 50
  match_thresh: 0.7
  fuse_score: true
  min_box_area: 10
  min_report_frames: 5
