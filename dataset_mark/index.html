<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChangeMark</title>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#08090d;--bg1:#0e1017;--bg2:#151821;--bg3:#1c2030;
            --border:#252a38;--border-l:#2e3448;
            --text:#dcd8d0;--text-dim:#68665e;--text-bright:#f4f2ee;
            --accent:#d4a853;--accent-glow:rgba(212,168,83,.12);
            --success:#38c8a0;--danger:#ff4848;
            --font-ui:'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif;
            --font-mono:'Cascadia Mono','Fira Code','Consolas','Courier New',monospace;
        }
        html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font:13px/1.5 var(--font-ui)}
        ::selection{background:var(--accent);color:var(--bg)}
        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border-l);border-radius:3px}

        #app{display:grid;grid-template-rows:44px 1fr 26px;grid-template-columns:48px 1fr 240px;height:100vh;width:100vw}
        header{grid-column:1/-1;display:flex;align-items:center;padding:0 12px;background:var(--bg1);border-bottom:1px solid var(--border);gap:6px;z-index:10}
        #toolbar{display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;background:var(--bg1);border-right:1px solid var(--border)}
        #workspace{position:relative;overflow:hidden;background:var(--bg)}
        #panel{display:flex;flex-direction:column;overflow-y:auto;background:var(--bg1);border-left:1px solid var(--border)}
        footer{grid-column:1/-1;display:flex;align-items:center;padding:0 12px;background:var(--bg1);border-top:1px solid var(--border);font:11px var(--font-mono);color:var(--text-dim);gap:16px}

        .logo{font-weight:800;font-size:14px;color:var(--accent);white-space:nowrap;margin-right:4px}
        .h-left,.h-center,.h-right{display:flex;align-items:center;gap:6px}
        .h-center{flex:1;justify-content:center}
        .h-right{margin-left:auto}
        .pair-nav{display:flex;align-items:center;gap:3px;margin-left:8px}
        .pair-nav input{width:52px;text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text-bright);font:500 12px var(--font-mono);padding:2px 4px;outline:none}
        .pair-nav input:focus{border-color:var(--accent)}
        .pair-nav .sep{color:var(--text-dim);font:12px var(--font-mono)}
        .pair-nav .total{font:12px var(--font-mono);color:var(--text-dim);min-width:36px}
        .view-modes{display:flex;background:var(--bg2);border-radius:5px;padding:2px;gap:1px}
        .view-btn{padding:3px 12px;border:none;background:transparent;color:var(--text-dim);font:500 11px var(--font-ui);border-radius:3px;cursor:pointer;transition:all .15s}
        .view-btn.active{background:var(--accent);color:var(--bg)}
        .view-btn:hover:not(.active){color:var(--text)}
        .save-status{font:11px var(--font-mono);margin-right:4px;transition:color .3s;white-space:nowrap}
        .save-status.saving{color:var(--accent)}.save-status.saved{color:var(--success)}.save-status.error{color:var(--danger)}.save-status.editing{color:var(--text-dim)}

        .btn{padding:4px 12px;border:1px solid var(--border);border-radius:4px;font:500 11px var(--font-ui);cursor:pointer;transition:all .15s;white-space:nowrap;background:var(--bg2);color:var(--text)}
        .btn:hover{background:var(--bg3);border-color:var(--border-l)}
        .btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
        .btn-primary:hover{background:#e0b863}
        .btn-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:4px;background:var(--bg2);color:var(--text);cursor:pointer;font-size:15px;transition:all .15s;line-height:1}
        .btn-icon:hover{background:var(--bg3);border-color:var(--border-l)}
        .btn-icon:disabled{opacity:.3;cursor:default}

        .tool-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;border-radius:5px;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;position:relative}
        .tool-btn:hover{color:var(--text);background:var(--bg2)}
        .tool-btn.active{color:var(--accent);background:var(--accent-glow)}
        .tool-btn.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--accent);border-radius:0 2px 2px 0}
        .tool-btn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
        .tb-div{width:26px;height:1px;background:var(--border);margin:3px 0}
        .color-section{margin-top:4px}
        .color-label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px}
        .color-row{display:flex;gap:5px;flex-wrap:wrap}
        .color-btn{width:26px;height:26px;border-radius:5px;border:2px solid var(--border);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;padding:0}
        .color-btn:hover{border-color:var(--text-dim);transform:scale(1.1)}
        .color-btn.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
        .color-custom-icon{font-size:13px;line-height:1}
        #customColor{width:0;height:0;padding:0;border:none;position:absolute;opacity:0}

        .panel-section{padding:12px 14px;border-bottom:1px solid var(--border)}
        .panel-section h3{font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:8px}
        .panel-section label{display:flex;flex-direction:column;gap:3px;font-size:12px;color:var(--text-dim);margin-bottom:8px}
        .panel-section label span{font-family:var(--font-mono);color:var(--accent);float:right}
        input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--bg3);border-radius:2px;outline:none;margin-top:2px}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg1)}
        .toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:6px}
        .toggle-row input[type=checkbox]{-webkit-appearance:none;width:30px;height:16px;background:var(--bg3);border-radius:8px;position:relative;cursor:pointer;transition:background .2s}
        .toggle-row input[type=checkbox]::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:var(--text-dim);top:2px;left:2px;transition:all .2s}
        .toggle-row input[type=checkbox]:checked{background:var(--accent)}
        .toggle-row input[type=checkbox]:checked::after{background:var(--bg);left:16px}
        .shortcut-list{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--text-dim)}
        .shortcut-list div{display:flex;align-items:center;gap:5px}
        kbd{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:16px;padding:0 4px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;font:400 9px var(--font-mono);color:var(--text)}

        #canvas{position:absolute;top:0;left:0;width:100%;height:100%}
        .welcome{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5}
        .welcome.hidden{display:none}
        .welcome-content{text-align:center;max-width:400px;padding:40px;animation:fadeUp .4s ease}
        .welcome-icon{margin:0 auto 16px;width:64px;height:64px;border:2px dashed var(--border-l);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--text-dim)}
        .welcome-icon svg{width:28px;height:28px}
        .welcome-content h1{font-weight:800;font-size:26px;color:var(--text-bright);margin-bottom:4px}
        .welcome-content p{color:var(--text-dim);margin-bottom:4px}
        .welcome-hint{font-size:12px!important;margin-bottom:16px!important}
        .loading-overlay{position:absolute;inset:0;background:rgba(8,9,13,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:20;font-size:13px;color:var(--text-dim)}
        .loading-overlay.hidden{display:none}
        .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
        .drop-active{outline:2px dashed var(--accent);outline-offset:-2px;background:var(--accent-glow)!important}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
        .modal-overlay.hidden{display:none}
        .modal-box{background:var(--bg1);border:1px solid var(--border);border-radius:10px;width:500px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .modal-box.large{width:640px}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
        .modal-header h2{font-weight:700;font-size:15px;color:var(--text-bright)}
        .modal-close{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-dim);font-size:18px;cursor:pointer;border-radius:4px}
        .modal-close:hover{color:var(--text);background:var(--bg3)}
        .modal-body{padding:16px 18px;overflow-y:auto;flex:1}
        .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:10px 18px;border-top:1px solid var(--border)}

        .ds-progress{margin-bottom:12px}
        .ds-progress .progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:6px}
        .ds-progress .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
        .ds-progress .progress-text{font:11px var(--font-mono);color:var(--text-dim)}
        .ds-controls{display:flex;gap:8px;margin-bottom:10px;align-items:center}
        .ds-search{flex:1;padding:5px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);font:400 12px var(--font-ui);outline:none}
        .ds-search:focus{border-color:var(--accent)}.ds-search::placeholder{color:var(--text-dim)}
        .ds-filters{display:flex;gap:2px}
        .ds-filter{padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg2);color:var(--text-dim);font:500 11px var(--font-ui);cursor:pointer;transition:all .15s}
        .ds-filter.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
        .ds-filter:hover:not(.active){color:var(--text)}
        .ds-list{max-height:400px;overflow-y:auto;border:1px solid var(--border);border-radius:6px}
        .ds-item{display:flex;align-items:center;gap:8px;padding:5px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
        .ds-item:last-child{border-bottom:none}.ds-item:hover{background:var(--bg2)}.ds-item.current{background:var(--accent-glow)}
        .ds-item .ds-idx{font:400 11px var(--font-mono);color:var(--accent);min-width:42px}
        .ds-item .ds-name{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .ds-item .ds-status{font-size:13px;min-width:18px;text-align:center}
        .ds-item .ds-status.done{color:var(--success)}.ds-item .ds-status.empty{color:var(--border-l)}

        .file-groups{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .file-group h4{font-size:12px;font-weight:500;color:var(--accent);margin-bottom:6px}
        .file-group input[type=file]{display:block;width:100%;font-size:12px;color:var(--text-dim)}
        .file-group input[type=file]::file-selector-button{padding:5px 10px;margin-right:8px;border:1px solid var(--border);border-radius:4px;background:var(--bg2);color:var(--text);font:400 12px var(--font-ui);cursor:pointer}
        .pair-preview{margin-top:12px;max-height:120px;overflow-y:auto;border:1px solid var(--border);border-radius:6px}
        .pair-preview:empty{display:none}
        .pp-item{display:flex;align-items:center;gap:6px;padding:4px 10px;font:11px var(--font-mono);border-bottom:1px solid var(--border)}
        .pp-item:last-child{border-bottom:none}.pp-idx{color:var(--accent);min-width:22px}.pp-arrow{color:var(--text-dim)}

        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div id="app">
    <header>
        <div class="h-left">
            <button class="btn-icon" id="datasetBtn" title="数据集 (L)" style="display:none">&#9776;</button>
            <span class="logo">ChangeMark</span>
            <div class="pair-nav" id="pairNav" style="display:none">
                <button class="btn-icon" id="prevBtn" title="上一对">&#8249;</button>
                <input type="number" id="pairInput" value="0" min="0">
                <span class="sep">/</span>
                <span class="total" id="pairTotal">0</span>
                <button class="btn-icon" id="nextBtn" title="下一对">&#8250;</button>
            </div>
        </div>
        <div class="h-center">
            <div class="view-modes">
                <button class="view-btn active" data-mode="overlay">叠加</button>
                <button class="view-btn" data-mode="split">对比</button>
                <button class="view-btn" data-mode="verify">验证</button>
            </div>
        </div>
        <div class="h-right">
            <span class="save-status" id="saveStatus"></span>
            <button class="btn" id="loadBtn">加载图片</button>
            <button class="btn" id="exportPngBtn">导出 PNG</button>
            <button class="btn btn-primary" id="exportJsonBtn">导出 JSON</button>
        </div>
    </header>

    <aside id="toolbar">
        <button class="tool-btn active" data-tool="brush" title="画笔 (B)">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="橡皮擦 (E)">
            <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.2 2.2c.8-.8 2-.8 2.8 0L21.8 7c.8.8.8 2 0 2.8L12 20"/><line x1="7" y1="20" x2="20" y2="20"/></svg>
        </button>
        <button class="tool-btn" data-tool="polygon" title="多边形 (P)">
            <svg viewBox="0 0 24 24"><polygon points="12,3 21,10 17,21 7,21 3,10"/></svg>
        </button>
        <div class="tb-div"></div>
        <button class="tool-btn" id="undoBtn" title="撤销 (Ctrl+Z)">
            <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <button class="tool-btn" id="redoBtn" title="重做 (Ctrl+Y)">
            <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
        </button>
        <div class="tb-div"></div>
        <button class="tool-btn" id="clearBtn" title="清除标注 (Del)">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        </button>
    </aside>

    <main id="workspace">
        <canvas id="canvas"></canvas>
        <div id="welcome" class="welcome">
            <div class="welcome-content">
                <div class="welcome-icon">
                    <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="28" height="28" rx="4"/><line x1="16" y1="9" x2="16" y2="23"/><line x1="9" y1="16" x2="23" y2="16"/></svg>
                </div>
                <h1>ChangeMark</h1>
                <p>变化检测标注工具</p>
                <p class="welcome-hint">拖拽图片到此处，或点击下方按钮加载</p>
                <button class="btn btn-primary" id="welcomeLoadBtn">加载图片对</button>
            </div>
        </div>
        <div id="loadingOverlay" class="loading-overlay hidden">
            <div class="spinner"></div>
            <span id="loadingText">加载中...</span>
        </div>
    </main>

    <aside id="panel">
        <div class="panel-section">
            <h3>画笔</h3>
            <label>大小 <span id="bsVal">15</span>px<input type="range" id="bsRange" min="1" max="120" value="15"></label>
            <div class="color-section">
                <span class="color-label">标注颜色</span>
                <div class="color-row" id="colorRow">
                    <button class="color-btn active" data-color="#ff4040" style="background:#ff4040" title="红色"></button>
                    <button class="color-btn" data-color="#40ff40" style="background:#40ff40" title="绿色"></button>
                    <button class="color-btn" data-color="#40aaff" style="background:#40aaff" title="蓝色"></button>
                    <button class="color-btn" data-color="#ffff40" style="background:#ffff40" title="黄色"></button>
                    <button class="color-btn" data-color="#ff40ff" style="background:#ff40ff" title="紫色"></button>
                    <button class="color-btn" data-color="#ffffff" style="background:#ffffff" title="白色"></button>
                    <button class="color-btn" data-color="#40ffff" style="background:#40ffff" title="青色"></button>
                    <button class="color-btn" data-color="custom" title="自定义">
                        <span class="color-custom-icon">&#9998;</span>
                    </button>
                    <input type="color" id="customColor" value="#ff8800" style="display:none">
                </div>
            </div>
        </div>
        <div class="panel-section">
            <h3>显示</h3>
            <label>T2 透明度 <span id="t2Val">50</span>%<input type="range" id="t2Range" min="0" max="100" value="50"></label>
            <label>标注透明度 <span id="moVal">45</span>%<input type="range" id="moRange" min="0" max="100" value="45"></label>
            <label>差异阈值 <span id="dtVal">30</span><input type="range" id="dtRange" min="5" max="120" value="30"></label>
            <div class="toggle-row"><span>显示标注 (M)</span><input type="checkbox" id="chkMask" checked></div>
            <div class="toggle-row"><span>显示 T2 (T)</span><input type="checkbox" id="chkT2" checked></div>
            <div class="toggle-row"><span>差异高亮 (D)</span><input type="checkbox" id="chkDiff"></div>
        </div>
        <div class="panel-section">
            <h3>快捷键</h3>
            <div class="shortcut-list">
                <div><kbd>B</kbd> 画笔</div>
                <div><kbd>E</kbd> 橡皮擦</div>
                <div><kbd>P</kbd> 多边形</div>
                <div><kbd>[</kbd> <kbd>]</kbd> 缩放笔刷</div>
                <div><kbd>Space</kbd>+拖拽 平移</div>
                <div><kbd>滚轮</kbd> 缩放</div>
                <div><kbd>Ctrl</kbd>+<kbd>Z</kbd>/<kbd>Y</kbd> 撤销/重做</div>
                <div><kbd>&larr;</kbd> <kbd>&rarr;</kbd> 翻页</div>
                <div><kbd>Del</kbd> 清除标注</div>
                <div><kbd>Esc</kbd> 取消多边形</div>
                <div><kbd>L</kbd> 数据集浏览器</div>
            </div>
        </div>
    </aside>

    <footer>
        <span id="coordsInfo">&mdash;</span>
        <span id="zoomInfo">100%</span>
        <span id="toolInfo">画笔</span>
        <span id="pairInfo" style="margin-left:auto">&mdash;</span>
    </footer>
</div>

<div id="datasetModal" class="modal-overlay hidden">
    <div class="modal-box large">
        <div class="modal-header">
            <h2>数据集浏览</h2>
            <button class="modal-close" id="dsCloseBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="ds-progress">
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0"></div></div>
                <span class="progress-text" id="progressText">加载中...</span>
            </div>
            <div class="ds-controls">
                <input type="text" class="ds-search" id="dsSearch" placeholder="搜索文件名...">
                <div class="ds-filters">
                    <button class="ds-filter active" data-f="all">全部</button>
                    <button class="ds-filter" data-f="done">已标注</button>
                    <button class="ds-filter" data-f="todo">未标注</button>
                </div>
            </div>
            <div class="ds-list" id="dsList"></div>
        </div>
        <div class="modal-footer">
            <button class="btn" id="exportAllBtn">导出全部 ZIP</button>
            <button class="btn btn-primary" id="dsCloseBtn2">关闭</button>
        </div>
    </div>
</div>

<div id="loadModal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h2>加载图片对</h2>
            <button class="modal-close" id="lmCloseBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="file-groups">
                <div class="file-group"><h4>T1 (前期)</h4><input type="file" id="t1Input" multiple accept="image/*"></div>
                <div class="file-group"><h4>T2 (后期)</h4><input type="file" id="t2Input" multiple accept="image/*"></div>
            </div>
            <div class="pair-preview" id="pairPreview"></div>
        </div>
        <div class="modal-footer">
            <button class="btn" id="lmCancelBtn">取消</button>
            <button class="btn btn-primary" id="lmConfirmBtn">确认加载</button>
        </div>
    </div>
</div>

<script>
    (function(){
        'use strict';

        var $=function(id){return document.getElementById(id)};
        var canvas=$('canvas');
        var ctx=canvas.getContext('2d');
        var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')};

        var S={
            mode:'none',
            serverPairs:[],
            standalonePages:[],
            pendingT1:[], pendingT2:[],
            curIdx:-1, curPair:null,
            dirty:false, saving:false, saveTimer:null,
            tool:'brush', brushSize:15,brushColor:'#ff4040',
            viewMode:'overlay', showMask:true, showT2:true, showDiff:false,
            t2Op:.5, maskOp:.45, diffTh:30,
            zoom:1, panX:0, panY:0,
            drawing:false, panning:false, spaceDown:false,
            lastIX:0, lastIY:0, panSX:0, panSY:0,
            mx:0, my:0, mouseOn:false,
            polyPts:[], undoStk:[], redoStk:[],
            curT1:null, curT2:null, curMask:null,
            imgW:0, imgH:0
        };

        /* ── API ── */
        var API={
            get:function(u){return fetch(u).then(function(r){if(!r.ok)throw 0;return r})},
            json:function(u){return API.get(u).then(function(r){return r.json()})},
            put:function(u,b){return fetch(u,{method:'PUT',body:b}).then(function(r){return r.json()})}
        };

        /* ── INIT ── */
        function init(){
            resizeCanvas();
            setupEvents();
            render();
            API.json('/api/stats').then(function(st){
                S.mode='server';
                $('datasetBtn').style.display='';
                $('pairNav').style.display='';
                $('pairTotal').textContent=st.total;
                $('pairInfo').textContent=st.done+'/'+st.total+' 已标注';
                loadPairList();
                if(st.total>0) navigateTo(0);
            }).catch(function(){
                S.mode='standalone';
            });
        }

        /* ── RESIZE ── */
        function resizeCanvas(){
            var r=$('workspace').getBoundingClientRect();
            var dpr=window.devicePixelRatio||1;
            canvas.width=Math.floor(r.width*dpr);
            canvas.height=Math.floor(r.height*dpr);
            canvas.style.width=r.width+'px';
            canvas.style.height=r.height+'px';
        }
        var ro=new ResizeObserver(function(){resizeCanvas();rr()});
        ro.observe($('workspace'));
        var raf=0;
        function rr(){if(!raf){raf=requestAnimationFrame(function(){raf=0;render()})}}

        /* ── TRANSFORM ── */
        function getT(){
            if(!S.imgW)return null;
            var dpr=window.devicePixelRatio||1;
            var cw=canvas.width/dpr,ch=canvas.height/dpr;
            var fit=Math.min((cw-40)/S.imgW,(ch-40)/S.imgH,1);
            var sc=fit*S.zoom;
            var dw=S.imgW*sc,dh=S.imgH*sc;
            var ox=(cw-dw)/2+S.panX, oy=(ch-dh)/2+S.panY;
            return {sc:sc,ox:ox,oy:oy,dw:dw,dh:dh,cw:cw,ch:ch,fit:fit};
        }
        function s2i(sx,sy){var t=getT();if(!t)return null;return{x:(sx-t.ox)/t.sc,y:(sy-t.oy)/t.sc}}
        function i2s(ix,iy){var t=getT();if(!t)return null;return{x:ix*t.sc+t.ox,y:iy*t.sc+t.oy}}

        /* ── RENDER ── */
        function render(){
            var dpr=window.devicePixelRatio||1;
            var cw=canvas.width/dpr,ch=canvas.height/dpr;
            ctx.setTransform(dpr,0,0,dpr,0,0);
            ctx.clearRect(0,0,cw,ch);
            ctx.fillStyle='#08090d';ctx.fillRect(0,0,cw,ch);
            if(!S.curT1||!S.imgW)return;
            var t=getT();if(!t)return;

            ctx.save();
            ctx.translate(t.ox,t.oy);

            if(S.viewMode==='split'){
                renderSplit(t);
            }else{
                renderOverlay(t,S.viewMode==='verify');
            }

            if(S.tool==='polygon'&&S.polyPts.length>0) renderPoly(t);
            ctx.restore();
            renderCursor(t);
            updateZoomUI();
        }

        function renderOverlay(t,verify){
            ctx.drawImage(S.curT1,0,0,S.imgW,S.imgH);
            if(S.showT2&&S.curT2&&!verify){
                ctx.globalAlpha=S.t2Op;
                ctx.drawImage(S.curT2,0,0,S.imgW,S.imgH);
                ctx.globalAlpha=1;
            }
            if(S.showDiff&&S.diffCanvas){
                ctx.globalAlpha=.6;
                ctx.drawImage(S.diffCanvas,0,0,S.imgW,S.imgH);
                ctx.globalAlpha=1;
            }
            if(S.showMask&&S.curMask){
                ctx.globalAlpha=S.maskOp;
                ctx.drawImage(S.curMask,0,0,S.imgW,S.imgH);
                ctx.globalAlpha=1;
            }
        }

        function renderSplit(t){
            var mx=S.imgW/2;
            ctx.save();ctx.beginPath();ctx.rect(0,0,mx,S.imgH);ctx.clip();
            ctx.drawImage(S.curT1,0,0,S.imgW,S.imgH);
            if(S.showMask&&S.curMask){ctx.globalAlpha=S.maskOp;ctx.drawImage(S.curMask,0,0,S.imgW,S.imgH);ctx.globalAlpha=1;}
            ctx.restore();
            ctx.save();ctx.beginPath();ctx.rect(mx,0,mx,S.imgH);ctx.clip();
            if(S.curT2)ctx.drawImage(S.curT2,0,0,S.imgW,S.imgH);
            if(S.showDiff&&S.diffCanvas){ctx.globalAlpha=.6;ctx.drawImage(S.diffCanvas,0,0,S.imgW,S.imgH);ctx.globalAlpha=1;}
            if(S.showMask&&S.curMask){ctx.globalAlpha=S.maskOp;ctx.drawImage(S.curMask,0,0,S.imgW,S.imgH);ctx.globalAlpha=1;}
            ctx.restore();
            ctx.strokeStyle='#d4a853';ctx.lineWidth=2/t.sc;
            ctx.beginPath();ctx.moveTo(mx,0);ctx.lineTo(mx,S.imgH);ctx.stroke();
            var fs=Math.max(10,14/t.sc);
            ctx.font='600 '+fs+'px sans-serif';ctx.fillStyle='rgba(212,168,83,.85)';
            ctx.fillText('T1',8/t.sc,(fs+8)/t.sc);
            ctx.fillText('T2',mx+8/t.sc,(fs+8)/t.sc);
        }

        function renderPoly(t){
            var pts=S.polyPts,lw=2/t.sc,r=4/t.sc;
            ctx.save();
            ctx.strokeStyle='rgba(255,64,64,.85)';ctx.lineWidth=lw;ctx.setLineDash([6/t.sc,4/t.sc]);
            ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
            for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
            if(S.mouseOn){var m=s2i(S.mx,S.my);if(m)ctx.lineTo(m.x,m.y);}
            ctx.stroke();ctx.setLineDash([]);
            for(var j=0;j<pts.length;j++){
                ctx.beginPath();ctx.arc(pts[j].x,pts[j].y,r,0,Math.PI*2);
                ctx.fillStyle='rgba(255,64,64,.9)';ctx.fill();
                ctx.strokeStyle='#fff';ctx.lineWidth=1/t.sc;ctx.stroke();
            }
            if(pts.length>=3&&S.mouseOn){
                var m2=s2i(S.mx,S.my);
                if(m2&&Math.hypot(m2.x-pts[0].x,m2.y-pts[0].y)<12/t.sc){
                    ctx.beginPath();ctx.arc(pts[0].x,pts[0].y,r*2.5,0,Math.PI*2);
                    ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2/t.sc;ctx.stroke();
                }
            }
            ctx.restore();
        }

        function renderCursor(t){
            if(!S.mouseOn||S.panning)return;
            var sx=S.mx,sy=S.my;
            if(S.tool==='brush'||S.tool==='eraser'){
                var r=(S.brushSize/2)*t.sc;
                ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
                ctx.strokeStyle=S.tool==='eraser'?'rgba(255,255,255,.6)':'rgba(255,64,64,.7)';
                ctx.lineWidth=1.5;ctx.stroke();
            }else if(S.tool==='polygon'){
                ctx.beginPath();ctx.moveTo(sx-8,sy);ctx.lineTo(sx+8,sy);ctx.moveTo(sx,sy-8);ctx.lineTo(sx,sy+8);
                ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1;ctx.stroke();
            }
        }

        /* ── DIFF ── */
        function computeDiff(){
            if(!S.curT1||!S.curT2)return;
            var w=S.imgW,h=S.imgH;
            var tc=document.createElement('canvas');tc.width=w;tc.height=h;
            var tx=tc.getContext('2d');
            tx.drawImage(S.curT1,0,0,w,h);var d1=tx.getImageData(0,0,w,h);
            tx.clearRect(0,0,w,h);
            tx.drawImage(S.curT2,0,0,w,h);var d2=tx.getImageData(0,0,w,h);
            S.diffCanvas=document.createElement('canvas');S.diffCanvas.width=w;S.diffCanvas.height=h;
            var dx=S.diffCanvas.getContext('2d');
            var di=dx.createImageData(w,h);
            var th=S.diffTh;
            for(var i=0;i<w*h;i++){
                var dr=Math.abs(d1.data[i*4]-d2.data[i*4]);
                var dg=Math.abs(d1.data[i*4+1]-d2.data[i*4+1]);
                var db=Math.abs(d1.data[i*4+2]-d2.data[i*4+2]);
                var diff=dr*.299+dg*.587+db*.114;
                if(diff>th){
                    var a=Math.min(255,(diff-th)*4);
                    di.data[i*4]=255;di.data[i*4+1]=Math.max(0,220-diff*2);di.data[i*4+2]=30;di.data[i*4+3]=a;
                }
            }
            dx.putImageData(di,0,0);
        }

        /* ── TOOLS ── */
        function toolDown(x,y){
            if(!S.imgW)return;
            if(S.tool==='polygon'){addPolyPt(x,y);return;}
            saveUndo();S.drawing=true;S.lastIX=x;S.lastIY=y;
            drawDot(x,y,S.tool==='eraser');rr();
        }
        function toolMove(x,y){
            if(!S.drawing)return;
            drawLine(S.lastIX,S.lastIY,x,y,S.tool==='eraser');
            S.lastIX=x;S.lastIY=y;rr();
        }
        function toolUp(){S.drawing=false;}

        function drawDot(x,y,erase){
            var mc=S.curMask.getContext('2d');
            mc.globalCompositeOperation=erase?'destination-out':'source-over';
            mc.beginPath();mc.arc(x,y,S.brushSize/2,0,Math.PI*2);
            mc.fillStyle=erase?'white':S.brushColor;
            mc.fill();
            mc.globalCompositeOperation='source-over';
        }
        function drawLine(x0,y0,x1,y1,erase){
            var d=Math.hypot(x1-x0,y1-y0);
            var steps=Math.max(1,Math.ceil(d/(S.brushSize*.25)));
            for(var i=0;i<=steps;i++){
                var t=steps===0?0:i/steps;
                drawDot(x0+t*(x1-x0),y0+t*(y1-y0),erase);
            }
        }

        function addPolyPt(x,y){
            var pts=S.polyPts;
            if(pts.length>=3){
                var f=pts[0];
                var sc=getT()?getT().sc:1;
                if(Math.hypot(x-f.x,y-f.y)<12/Math.max(.01,sc)){closePoly();return;}
            }
            pts.push({x:x,y:y});rr();
        }
        function closePoly(){
            if(S.polyPts.length<3||!S.curMask)return;
            saveUndo();
            var mc=S.curMask.getContext('2d');
            mc.beginPath();mc.moveTo(S.polyPts[0].x,S.polyPts[0].y);
            for(var i=1;i<S.polyPts.length;i++)mc.lineTo(S.polyPts[i].x,S.polyPts[i].y);
            mc.closePath();mc.fillStyle=S.brushColor;mc.fill();
            S.polyPts=[];rr();
        }

        /* ── UNDO/REDO ── */
        function saveUndo(){
            if(!S.curMask)return;
            var mc=S.curMask.getContext('2d');
            S.undoStk.push(mc.getImageData(0,0,S.imgW,S.imgH));
            S.redoStk=[];
            if(S.undoStk.length>60)S.undoStk.shift();
            markDirty();
        }
        function undo(){
            if(!S.undoStk.length||!S.curMask)return;
            var mc=S.curMask.getContext('2d');
            S.redoStk.push(mc.getImageData(0,0,S.imgW,S.imgH));
            mc.putImageData(S.undoStk.pop(),0,0);
            markDirty();rr();
        }
        function redo(){
            if(!S.redoStk.length||!S.curMask)return;
            var mc=S.curMask.getContext('2d');
            S.undoStk.push(mc.getImageData(0,0,S.imgW,S.imgH));
            mc.putImageData(S.redoStk.pop(),0,0);
            markDirty();rr();
        }

        /* ── DIRTY / AUTO-SAVE ── */
        function markDirty(){
            S.dirty=true;
            var st=$('saveStatus');
            st.textContent='未保存';st.className='save-status editing';
            clearTimeout(S.saveTimer);
            S.saveTimer=setTimeout(function(){saveCurrent()},2000);
        }
        function saveCurrent(){
            if(!S.dirty||!S.curMask)return;
            if(S.mode==='server'&&S.curIdx>=0){
                S.saving=true;
                var st=$('saveStatus');st.textContent='保存中...';st.className='save-status saving';
                S.curMask.toBlob(function(blob){
                    if(!blob){S.saving=false;return;}
                    API.put('/api/mask/'+S.curIdx,blob).then(function(){
                        S.dirty=false;S.saving=false;
                        st.textContent='已保存';st.className='save-status saved';
                    }).catch(function(){
                        S.saving=false;
                        st.textContent='保存失败';st.className='save-status error';
                    });
                },'image/png');
            }else{
                S.dirty=false;
                var st2=$('saveStatus');st2.textContent='已保存';st2.className='save-status saved';
            }
        }

        /* ── LOAD PAIR ── */
        function loadPair(idx){
            S.curIdx=idx;
            S.undoStk=[];S.redoStk=[];S.polyPts=[];S.dirty=false;
            S.curT1=null;S.curT2=null;S.curMask=null;S.diffCanvas=null;

            var pair;
            if(S.mode==='server'){
                pair=S.serverPairs[idx];
                if(!pair)return;
                showLoading('加载 #'+idx+' ...');
                var t1p=API.get('/api/img/'+idx+'/t1').then(function(r){return r.blob()}).then(blobToImg);
                var t2p=API.get('/api/img/'+idx+'/t2').then(function(r){return r.blob()}).then(blobToImg);
                var mkp=API.get('/api/mask/'+idx).then(function(r){return r.blob()}).then(blobToImg).catch(function(){return null});
                return Promise.all([t1p,t2p,mkp]).then(function(arr){
                    finishLoad(arr[0],arr[1],arr[2],idx);
                    hideLoading();
                }).catch(function(){hideLoading()});
            }else{
                pair=S.standalonePages[idx];
                if(!pair)return;
                finishLoad(pair.t1,pair.t2,null,idx);
                return Promise.resolve();
            }
        }

        function finishLoad(t1,t2,mask,idx){
            S.curT1=t1;S.curT2=t2;
            S.imgW=t1.naturalWidth;S.imgH=t1.naturalHeight;
            S.curMask=document.createElement('canvas');
            S.curMask.width=S.imgW;S.curMask.height=S.imgH;
            if(mask){
                var mc=S.curMask.getContext('2d');
                mc.drawImage(mask,0,0,S.imgW,S.imgH);
            }
            S.zoom=1;S.panX=0;S.panY=0;
            computeDiff();
            $('welcome').classList.add('hidden');
            updateNavUI();rr();
            var st=$('saveStatus');
            if(S.mode==='server'&&S.serverPairs[idx]&&S.serverPairs[idx].annotated){
                st.textContent='已标注';st.className='save-status saved';
            }else{st.textContent='';st.className='save-status';}
        }

        function navigateTo(idx){
            if(S.dirty)saveCurrent();
            loadPair(idx);
        }

        /* ── PAIR LIST ── */
        function loadPairList(){
            var filt=document.querySelector('.ds-filter.active');
            var f=filt?filt.dataset.f:'all';
            var q=$('dsSearch').value;
            API.json('/api/pairs?filter='+f+'&q='+encodeURIComponent(q)).then(function(d){
                S.serverPairs=d.items;
                S.totalCount=d.stats.total;
                renderDSList(d.items);
                $('progressFill').style.width=d.stats.progress+'%';
                $('progressText').textContent=d.stats.done+' / '+d.stats.total+' 已标注 ('+d.stats.progress+'%)';
            });
        }

        function renderDSList(items){
            var el=$('dsList');el.innerHTML='';
            for(var i=0;i<items.length;i++){
                var p=items[i];
                var d=document.createElement('div');
                d.className='ds-item'+(p.index===S.curIdx?' current':'');
                d.innerHTML='<span class="ds-idx">#'+p.index+'</span>'+
                    '<span class="ds-name">'+esc(p.t1)+' &harr; '+esc(p.t2)+'</span>'+
                    '<span class="ds-status '+(p.annotated?'done':'empty')+'">'+(p.annotated?'&#10003;':'&#9675;')+'</span>';
                d.dataset.idx=p.index;
                d.addEventListener('click',function(){var i=parseInt(this.dataset.idx);navigateTo(i);closeDS();});
                el.appendChild(d);
            }
        }

        /* ── NAV ── */
        function getTotal(){
            if(S.mode==='server')return S.serverPairs.length;
            return S.standalonePages.length;
        }
        function updateNavUI(){
            var total=getTotal();
            $('pairInput').value=S.curIdx;
            $('pairTotal').textContent=total;
            $('pairInfo').textContent='第 '+(S.curIdx+1)+' / '+total+' 对';
            $('prevBtn').disabled=S.curIdx<=0;
            $('nextBtn').disabled=S.curIdx>=total-1;
        }

        /* ── ZOOM/PAN ── */
        function doZoom(delta,cx,cy){
            if(!S.imgW)return;
            var old=S.zoom;
            S.zoom=Math.max(.05,Math.min(60,S.zoom*(1+delta)));
            var ratio=S.zoom/old;
            S.panX=cx-ratio*(cx-S.panX);
            S.panY=cy-ratio*(cy-S.panY);
            rr();updateZoomUI();
        }
        function resetView(){S.zoom=1;S.panX=0;S.panY=0;rr();updateZoomUI();}

        /* ── EXPORT ── */
        function exportPNG(){
            if(!S.curMask)return;
            var ec=document.createElement('canvas');ec.width=S.imgW;ec.height=S.imgH;
            var ex=ec.getContext('2d');
            var md=S.curMask.getContext('2d').getImageData(0,0,S.imgW,S.imgH);
            var ed=ex.createImageData(S.imgW,S.imgH);
            for(var i=0;i<S.imgW*S.imgH;i++){
                var a=md.data[i*4+3];
                // 任何非透明像素都算标注，输出白色；否则黑色
                var hasColor=(a>10);
                // 也检查rgb通道，排除完全透明但有数据的异常
                var r=md.data[i*4],g=md.data[i*4+1],b=md.data[i*4+2];
                var v=(hasColor&&(r+g+b>0))?255:0;
                ed.data[i*4]=v;ed.data[i*4+1]=v;ed.data[i*4+2]=v;ed.data[i*4+3]=255;
            }
            ex.putImageData(ed,0,0);
            ec.toBlob(function(b){dlBlob(b,'mask_'+S.curIdx+'.png')});
        }

        function exportJSON(){
            if(!S.curMask)return;
            var mc=S.curMask.getContext('2d');
            var id=mc.getImageData(0,0,S.imgW,S.imgH);
            var mask=[];
            for(var y=0;y<S.imgH;y++){
                var row=[];
                for(var x=0;x<S.imgW;x++){
                    var p=(y*S.imgW+x)*4;
                    var v=(id.data[p+3]>10&&(id.data[p]+id.data[p+1]+id.data[p+2]>0))?1:0;
                    row.push(v);
                }
                mask.push(row);
            }
            var data={version:'1.0',tool:'ChangeMark',date:new Date().toISOString(),
                index:S.curIdx,width:S.imgW,height:S.imgH,mask:mask};
            dlBlob(new Blob([JSON.stringify(data)],{type:'application/json'}),'mask_'+S.curIdx+'.json');
        }

        function dlBlob(blob,name){
            var u=URL.createObjectURL(blob);
            var a=document.createElement('a');a.href=u;a.download=name;
            document.body.appendChild(a);a.click();document.body.removeChild(a);
            URL.revokeObjectURL(u);
        }

        /* ── MODALS ── */
        function openDS(){$('datasetModal').classList.remove('hidden');loadPairList();}
        function closeDS(){$('datasetModal').classList.add('hidden');}
        function openLoad(){$('loadModal').classList.remove('hidden');S.pendingT1=[];S.pendingT2=[];$('t1Input').value='';$('t2Input').value='';$('pairPreview').innerHTML='';}
        function closeLoad(){$('loadModal').classList.add('hidden');}
        function showLoading(t){$('loadingText').textContent=t||'加载中...';$('loadingOverlay').classList.remove('hidden');}
        function hideLoading(){$('loadingOverlay').classList.add('hidden');}

        function updatePP(){
            var t1=S.pendingT1,t2=S.pendingT2,n=Math.min(t1.length,t2.length);
            var el=$('pairPreview');
            if(!n){el.innerHTML='';return;}
            var h='';
            for(var i=0;i<n;i++)h+='<div class="pp-item"><span class="pp-idx">'+(i+1)+'</span>'+esc(t1[i].name)+'<span class="pp-arrow">&harr;</span>'+esc(t2[i].name)+'</div>';
            el.innerHTML=h;
        }

        function loadImg(f){
            return new Promise(function(res,rej){
                var r=new FileReader();
                r.onload=function(e){var img=new Image();img.onload=function(){res(img)};img.onerror=rej;img.src=e.target.result};
                r.onerror=rej;r.readAsDataURL(f);
            });
        }

        function confirmLoad(){
            var t1=S.pendingT1,t2=S.pendingT2,n=Math.min(t1.length,t2.length);
            if(!n){alert('请选择 T1 和 T2 图片');return;}
            showLoading('加载 '+n+' 对图片...');
            var jobs=[];
            for(var i=0;i<n;i++)jobs.push(Promise.all([loadImg(t1[i]),loadImg(t2[i])]));
            Promise.all(jobs).then(function(pairs){
                S.standalonePages=[];
                for(var j=0;j<pairs.length;j++){
                    S.standalonePages.push({t1:pairs[j][0],t2:pairs[j][1]});
                }
                $('pairNav').style.display='';
                $('pairTotal').textContent=S.standalonePages.length;
                closeLoad();
                hideLoading();
                navigateTo(0);
            }).catch(function(){hideLoading();alert('图片加载失败')});
        }

        /* ── TOOLBAR ── */
        function setTool(t){
            if(S.tool==='polygon'&&S.polyPts.length)S.polyPts=[];
            S.tool=t;
            document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b){b.classList.toggle('active',b.dataset.tool===t)});
            var names={brush:'画笔',eraser:'橡皮擦',polygon:'多边形'};
            $('toolInfo').textContent=names[t]||t;
            rr();
        }

        /* ── EVENTS ── */
        function setupEvents(){
            canvas.addEventListener('mousedown',onMD);
            canvas.addEventListener('mousemove',onMM);
            canvas.addEventListener('mouseup',onMU);
            canvas.addEventListener('mouseleave',onML);
            canvas.addEventListener('wheel',onWh,{passive:false});
            canvas.addEventListener('dblclick',onDC);
            canvas.addEventListener('contextmenu',function(e){e.preventDefault()});

            var ws=$('workspace');
            ws.addEventListener('dragover',function(e){e.preventDefault();ws.classList.add('drop-active')});
            ws.addEventListener('dragleave',function(){ws.classList.remove('drop-active')});
            ws.addEventListener('drop',onDrop);

            window.addEventListener('keydown',onKD);
            window.addEventListener('keyup',onKU);

            document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b){
                b.addEventListener('click',function(){setTool(this.dataset.tool)});
            });
            $('undoBtn').addEventListener('click',undo);
            $('redoBtn').addEventListener('click',redo);
            $('clearBtn').addEventListener('click',function(){
                if(!S.curMask)return;saveUndo();
                S.curMask.getContext('2d').clearRect(0,0,S.imgW,S.imgH);rr();
            });

            $('bsRange').addEventListener('input',function(e){S.brushSize=+e.target.value;$('bsVal').textContent=e.target.value});
            $('t2Range').addEventListener('input',function(e){S.t2Op=e.target.value/100;$('t2Val').textContent=e.target.value;rr()});
            $('moRange').addEventListener('input',function(e){S.maskOp=e.target.value/100;$('moVal').textContent=e.target.value;rr()});
            $('dtRange').addEventListener('input',function(e){S.diffTh=+e.target.value;$('dtVal').textContent=e.target.value;computeDiff();rr()});
            $('chkMask').addEventListener('change',function(e){S.showMask=e.target.checked;rr()});
            $('chkT2').addEventListener('change',function(e){S.showT2=e.target.checked;rr()});
            $('chkDiff').addEventListener('change',function(e){S.showDiff=e.target.checked;rr()});

            // 预设颜色按钮
            document.querySelectorAll('.color-btn[data-color]').forEach(function(b){
                b.addEventListener('click',function(){
                    var c=this.dataset.color;
                    if(c==='custom'){
                        $('customColor').click();
                        return;
                    }
                    S.brushColor=c;
                    document.querySelectorAll('.color-btn').forEach(function(x){x.classList.remove('active')});
                    this.classList.add('active');
                });
            });
            // 自定义颜色
            $('customColor').addEventListener('input',function(e){
                S.brushColor=e.target.value;
                document.querySelectorAll('.color-btn').forEach(function(x){x.classList.remove('active')});
                document.querySelector('.color-btn[data-color="custom"]').classList.add('active');
                document.querySelector('.color-btn[data-color="custom"]').style.background=e.target.value;
            });
            
            document.querySelectorAll('.view-btn').forEach(function(b){
                b.addEventListener('click',function(){
                    S.viewMode=this.dataset.mode;
                    document.querySelectorAll('.view-btn').forEach(function(x){x.classList.remove('active')});
                    this.classList.add('active');rr();
                });
            });

            $('prevBtn').addEventListener('click',function(){if(S.curIdx>0)navigateTo(S.curIdx-1)});
            $('nextBtn').addEventListener('click',function(){if(S.curIdx<getTotal()-1)navigateTo(S.curIdx+1)});
            $('pairInput').addEventListener('change',function(){var v=parseInt(this.value);if(v>=0&&v<getTotal())navigateTo(v)});

            $('loadBtn').addEventListener('click',openLoad);
            $('welcomeLoadBtn').addEventListener('click',openLoad);
            $('exportPngBtn').addEventListener('click',exportPNG);
            $('exportJsonBtn').addEventListener('click',exportJSON);

            $('datasetBtn').addEventListener('click',openDS);
            $('dsCloseBtn').addEventListener('click',closeDS);
            $('dsCloseBtn2').addEventListener('click',closeDS);
            $('exportAllBtn').addEventListener('click',function(){window.open('/api/export','_blank')});
            $('dsSearch').addEventListener('input',function(){loadPairList()});
            document.querySelectorAll('.ds-filter').forEach(function(b){
                b.addEventListener('click',function(){
                    document.querySelectorAll('.ds-filter').forEach(function(x){x.classList.remove('active')});
                    this.classList.add('active');loadPairList();
                });
            });

            $('lmCloseBtn').addEventListener('click',closeLoad);
            $('lmCancelBtn').addEventListener('click',closeLoad);
            $('lmConfirmBtn').addEventListener('click',confirmLoad);
            $('t1Input').addEventListener('change',function(e){S.pendingT1=Array.from(e.target.files).sort(function(a,b){return a.name.localeCompare(b.name)});updatePP()});
            $('t2Input').addEventListener('change',function(e){S.pendingT2=Array.from(e.target.files).sort(function(a,b){return a.name.localeCompare(b.name)});updatePP()});
        }

        function onMD(e){
            if(e.button===1||S.spaceDown){S.panning=true;S.panSX=e.clientX-S.panX;S.panSY=e.clientY-S.panY;canvas.style.cursor='grabbing';return}
            if(e.button!==0)return;
            var m=s2i(e.offsetX,e.offsetY);if(!m)return;
            if(m.x<0||m.y<0||m.x>=S.imgW||m.y>=S.imgH)return;
            toolDown(m.x,m.y);
        }

        function onMM(e){
            S.mx=e.offsetX;S.my=e.offsetY;S.mouseOn=true;
            if(S.panning){S.panX=e.clientX-S.panSX;S.panY=e.clientY-S.panSY;rr();return}
            var m=s2i(e.offsetX,e.offsetY);
            if(m){$('coordsInfo').textContent='('+Math.floor(m.x)+', '+Math.floor(m.y)+')';toolMove(m.x,m.y)}
            rr();
        }

        function onMU(e){if(S.panning){S.panning=false;canvas.style.cursor='crosshair';return}toolUp()}

        function onML(){S.mouseOn=false;rr()}

        function onWh(e){
            e.preventDefault();
            doZoom(e.deltaY>0?-0.1:0.1,e.offsetX,e.offsetY);
        }

        function onDC(e){
            if(S.tool==='polygon'&&S.polyPts.length>=3){closePoly();return}
            resetView();
        }

        function onDrop(e){
            e.preventDefault();
            $('workspace').classList.remove('drop-active');
            var files=Array.from(e.dataTransfer.files).filter(function(f){return f.type.startsWith('image/')}).sort(function(a,b){return a.name.localeCompare(b.name)});
            if(files.length<2)return;
            var t1=[],t2=[],patterns=[/_t2/i,/_after/i,/_post/i,/_b\./i,/_B\./,/_2\./];
            files.forEach(function(f){if(patterns.some(function(p){return p.test(f.name)}))t2.push(f);else t1.push(f)});
            if(t1.length&&t2.length&&t1.length===t2.length){S.pendingT1=t1;S.pendingT2=t2}
            else{var half=Math.ceil(files.length/2);S.pendingT1=files.slice(0,half);S.pendingT2=files.slice(half)}
            openLoad();updatePP();
        }

        function onKD(e){
            if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
            var k=e.key.toLowerCase();
            if(k===' '){e.preventDefault();S.spaceDown=true;canvas.style.cursor='grab';return}
            if(e.ctrlKey||e.metaKey){
                if(k==='z'){e.preventDefault();if(e.shiftKey)redo();else undo();return}
                if(k==='y'){e.preventDefault();redo();return}
            }
            switch(k){
                case 'b':setTool('brush');break;
                case 'e':setTool('eraser');break;
                case 'p':setTool('polygon');break;
                case 'm':S.showMask=!S.showMask;$('chkMask').checked=S.showMask;rr();break;
                case 't':S.showT2=!S.showT2;$('chkT2').checked=S.showT2;rr();break;
                case 'd':S.showDiff=!S.showDiff;$('chkDiff').checked=S.showDiff;rr();break;
                case '[':S.brushSize=Math.max(1,S.brushSize-(S.brushSize>10?5:1));$('bsRange').value=S.brushSize;$('bsVal').textContent=S.brushSize;break;
                case ']':S.brushSize=Math.min(120,S.brushSize+(S.brushSize>=10?5:1));$('bsRange').value=S.brushSize;$('bsVal').textContent=S.brushSize;break;
                case 'arrowleft':if(S.curIdx>0)navigateTo(S.curIdx-1);break;
                case 'arrowright':if(S.curIdx<getTotal()-1)navigateTo(S.curIdx+1);break;
                case 'delete':$('clearBtn').click();break;
                case 'escape':S.polyPts=[];rr();break;
                case 'l':if(S.mode==='server')openDS();break;
                case '0':resetView();break;
                case '1':document.querySelector('[data-mode="overlay"]').click();break;
                case '2':document.querySelector('[data-mode="split"]').click();break;
                case '3':document.querySelector('[data-mode="verify"]').click();break;
            }
        }

        function onKU(e){if(e.key===' '){S.spaceDown=false;canvas.style.cursor='crosshair'}}

        function updateZoomUI(){var t=getT();$('zoomInfo').textContent=Math.round(S.zoom*100)+'%'}

        init();
    })();
</script>
</body>
</html>
